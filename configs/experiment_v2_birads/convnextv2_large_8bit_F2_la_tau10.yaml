# =============================================================================
# F2 (tau=1.0) — Logit-Adjusted Training (Menon et al. 2021), Regime A
# =============================================================================
# Branch from C6 — single change: training.logit_adjustment is enabled on the
# full (4-class) head with tau=1.0. Train-prior only (Regime A): pi computed
# from Dataset_1024_8bit train counts (1678/2754/1898/2227 → BR1/BR2/BR4/BR5).
# Test labels are NEVER consulted.
#
# Loss path (full head only):
#   L_full = CE(z + tau * log(pi_train), y, label_smoothing=0.05)
# Inference: argmax(z) — raw logits, no shift (matches C6 behavior).
#
# Menon recipe: when LA is on for a head, class re-weighting is dropped on
# that head (LA replaces it). class_weights still apply to binary/subgroup.
#
# Hypothesis: tau in {0.5, 1.0, 1.5} sweep; val_full_f1_macro selects tau*;
# single test report at the end. Lesson #50 attributes cascade rejection to
# train→test prior shift compounding multiplicatively. LA targets that
# shift directly, on the single head where the metric is computed.
#
# Phase E gate: val_full_f1_macro >= 0.6783 (C6 best val 0.7183 - 4pp tolerance
# given LA is a regularizer with different optimization dynamics).
# Kill criteria: val_full_f1_macro < 0.55 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "F2 tau=1.0 — Logit-Adjusted Training (Menon et al. 2021) | full head | train-prior"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  # Class weights still active on binary + subgroup heads. The full head's
  # class weights are dropped automatically when logit_adjustment is on
  # (Menon recipe). See utils/losses.py: drop_class_weights.
  class_weights: [1.28, 1.00, 1.20, 1.11]

  # F2 KEY KNOB — Logit Adjustment
  logit_adjustment:
    enabled: true
    tau: 1.0
    apply_to: ["full"]
    drop_class_weights: true

  use_swa: true
  swa_start_epoch: 5

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-logit-adjusted"
  dagshub_username: "alilivanturk"
  dagshub_token: "${DAGSHUB_TOKEN}"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_8bit_F2_la_tau10/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_8bit_F2_la_tau10/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_8bit_F2_la_tau10/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_8bit_F2_la_tau10/checkpoints"
  save_top_k: 3
  save_last: true
