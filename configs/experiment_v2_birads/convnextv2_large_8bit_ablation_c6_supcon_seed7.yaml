# =============================================================================
# C6-SupCon — ConvNeXtV2-Large + SupCon w/ hard-negative mining | seed=7
# =============================================================================
# Direction #3 (Lesson #60 + Lesson #61). Same architecture/schedule as C6.
# Adds an auxiliary embedding-space loss on patient_feat:
#   L_total = w_binary*L_binary + w_subgroup*L_subgroup + w_full*L_full
#           + supcon_weight * L_SupCon(patient_feat, labels)
#
# SupCon mechanism (distinct from Direction #5's KL distillation):
#   For each anchor i with class y_i, hard-negative mining selects the
#   top-k closest negatives in a 256-entry memory bank of recent embeddings.
#   The loss pulls anchor toward same-class positives and pushes away from
#   the closest different-class negatives. No teacher mean → no basin-selector
#   dynamic that destabilized seed=555 in Direction #5.
#
# Hyperparameters (informed by Lesson #61's variance-amplification fingerprint):
#   weight=0.03    — low; sd>0.025 across n=4 students = automatic kill.
#   tau=0.1        — slightly relaxed from canonical 0.07 (Khosla 2020).
#   top_k_neg=20   — focuses gradient on boundary negatives, not all negatives.
#   queue_size=256 — covers ~4 grad-accum cycles at effective B=64.
#   warmup_min=64  — bank must fill before SupCon contributes.
#
# Kill criteria:
#   1) val_full_f1_macro < 0.60 by epoch 15 (standard).
#   2) val_full_f1_BIRADS-1 ever drops below 0.30 mid-run (seed=555 collapse fingerprint).
#   3) sd(test_full_f1_macro) across n=4 SupCon seeds > 0.025 (Lesson #61 fingerprint).
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "C6 + SupCon hard-neg (weight=0.03, tau=0.1, top_k=20) — seed=7"
  seed: 7

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 5

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  # --- Direction #3: SupCon w/ hard-negative mining on patient_feat ---
  supcon:
    enabled: true
    weight: 0.03
    temperature: 0.1
    top_k_neg: 20
    queue_size: 256
    warmup_min: 64
    feat_dim: 512   # MUST match model.projection_dim

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-supcon"
  dagshub_username: "alilivanturk"
  dagshub_token: "${DAGSHUB_TOKEN}"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_supcon_seed7/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_supcon_seed7/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_supcon_seed7/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_8bit_ablation_c6_supcon_seed7/checkpoints"
  save_top_k: 3
  save_last: true
