# =============================================================================
# C6-Distill — ConvNeXtV2-Large CE + KL distillation from n=4 ensemble | seed=42
# =============================================================================
# Direction #5 (Lesson #60). Same architecture/loss/schedule as C6, with the
# full head's loss replaced by a hybrid:
#   L_full = (1 - alpha) * CE(z_student, hard_label)
#         + alpha * T^2 * KL( softmax(z_student / T) || softmax(z_teacher / T) )
#
# Teacher = arithmetic mean of full-head logits across the 4 trained C6 seeds
# {42, 7, 555, 999}, computed with val_transforms (no augmentation) on the
# entire Dataset_1024_8bit pool (8557 patients). See tools/build_ensemble_soft_targets.py.
#
# Why this might lift BR1 (per Lesson #60):
#   The Phase 0c k-NN signal proved BR1 unanimous-wrong patients sit
#   geometrically inside the BR2 cluster (frac<0.9 = 97.6%). The teacher's
#   softmax-at-T=4 distributes mass over BR2/BR4/BR5 in a way that encodes
#   relative distance to off-classes. Hard labels can only pull toward BR1;
#   soft targets pull toward BR1 while preserving the off-class ordering,
#   which is the missing geometric signal.
#
# Hyperparams (Hinton 2015 + Furlanello 2018 standard):
#   alpha=0.5, T=4.0  → both halves balanced; T=4 dilutes argmax dominance.
# Kill criterion: val_full_f1_macro < 0.60 by epoch 15.
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "C6 + ensemble distillation (alpha=0.5, T=4) — seed=42"
  seed: 42

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 4
    hidden_dim: 256
    dropout: 0.5
    temperature: 1.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  loss_type: "ce"
  label_smoothing: 0.05

  loss_weights:
    binary_head: 0.10
    subgroup_head: 0.45
    full_head: 0.45

  class_weights: [1.28, 1.00, 1.20, 1.11]

  use_swa: true
  swa_start_epoch: 5

  asymmetry_loss_weight: 0.0
  asymmetry_margin: 15.0
  asymmetry_benign_weight: 0.0
  asymmetry_malign_weight: 1.0

  # --- Direction #5: ensemble self-distillation on full head ---
  distill:
    enabled: true
    alpha: 0.5
    temperature: 4.0
    soft_target_prefix: "artifacts/c6_ensemble_n4"

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_full_f1_macro"
    mode: "max"

ablation:
  use_lateral_fusion: true
  use_bilateral_fusion: true
  use_binary_head: true
  use_subgroup_head: true
  use_uncertainty: true
  use_ordinal_head: false

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "birads-1024-8bit-distill"
  dagshub_username: "alilivanturk"
  dagshub_token: "d176ee2b4802fb2eb5e703cde1065dec251804e1"
  log_every_n_steps: 50

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  gradcam:
    enabled: true
    target_layer: "auto"
    num_samples: 20
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_distill_seed42/gradcam"
  confusion_matrix:
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_distill_seed42/plots"
  classification_report:
    save_dir: "outputs/convnextv2_large_8bit_ablation_c6_distill_seed42/reports"

checkpoint:
  save_dir: "outputs/convnextv2_large_8bit_ablation_c6_distill_seed42/checkpoints"
  save_top_k: 3
  save_last: true
