# =============================================================================
# G2a — Cascade Stage-2 Benign Specialist: BR1 vs BR2
# =============================================================================
# Trains only on BR1/BR2 patients. Full C6 pipeline:
#   backbone (weight-shared, 4 views) -> bidirectional lateral cross-attention
#   -> asymmetry-aware bilateral fusion -> patient_feat -> 2-class head.
#
# Train data: data/manifests/cascade/train_stage2a_benign.csv   (3767 patients)
# Val data:   data/manifests/cascade/val_stage2a_benign.csv     (665 patients)
# Class weights: sqrt-inv [BR1=1.28, BR2=1.00]
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "G2a — Cascade Stage-2 benign specialist (BR1 vs BR2, full fusion)"
  seed: 42

cascade:
  stage: stage2a
  train_manifest: data/manifests/cascade/train_stage2a_benign.csv
  val_manifest:   data/manifests/cascade/val_stage2a_benign.csv

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 2
    hidden_dim: 256
    dropout: 0.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  label_smoothing: 0.05

  # sqrt-inv from manifest: BR1=1426, BR2=2341 -> sqrt(2341/1426)=1.281
  class_weights: [1.28, 1.00]

  use_swa: true
  swa_start_epoch: 5

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_f1_macro"
    mode: "max"

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "cascade/stage2_benign"
  dagshub_username: "alilivanturk"
  dagshub_token: "${DAGSHUB_TOKEN}"
  log_every_n_steps: 50
  tags:
    parent_experiment: C6
    cascade_stage: stage2a

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  confusion_matrix:
    save_dir: "outputs/G2a_stage2_benign/plots"
  classification_report:
    save_dir: "outputs/G2a_stage2_benign/reports"

checkpoint:
  save_dir: "outputs/G2a_stage2_benign/checkpoints"
  save_top_k: 3
  save_last: true
