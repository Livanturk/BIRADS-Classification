# =============================================================================
# G2b — Cascade Stage-2 Malign Specialist: BR4 vs BR5
# =============================================================================
# Trains only on BR4/BR5 patients. Full C6 pipeline:
#   backbone (weight-shared, 4 views) -> bidirectional lateral cross-attention
#   -> asymmetry-aware bilateral fusion -> patient_feat -> 2-class head.
#
# Train data: data/manifests/cascade/train_stage2b_malign.csv   (3506 patients)
# Val data:   data/manifests/cascade/val_stage2b_malign.csv     (619 patients)
# Class weights: sqrt-inv [BR4=1.08, BR5=1.00]
# =============================================================================

project:
  name: "mammography-birads-classification"
  description: "G2b — Cascade Stage-2 malign specialist (BR4 vs BR5, full fusion)"
  seed: 42

cascade:
  stage: stage2b
  train_manifest: data/manifests/cascade/train_stage2b_malign.csv
  val_manifest:   data/manifests/cascade/val_stage2b_malign.csv

data:
  root_dir: "Dataset_1024_8bit"
  test_dir: "Dataset_Test_1024_8bit"
  image_size: 1024
  num_workers: 4
  pin_memory: true
  bit_depth: 8
  dataset_variant: "noseg"

  split:
    train: 0.85
    val: 0.15

  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation_degrees: 10
    brightness: 0.1
    contrast: 0.1
    random_erasing: 0.1

model:
  backbone:
    name: "convnextv2_large.fcmae_ft_in22k_in1k_384"
    pretrained: true
    freeze_layers: 0
    feature_dim: 1536
    projection_dropout: 0.2

  projection_dim: 512

  lateral_fusion:
    num_heads: 8
    attention_dropout: 0.15
    ffn_dropout: 0.2
    projection_dropout: 0.2
    num_layers: 2
    use_deformable: true
    num_deformable_points: 4

  bilateral_fusion:
    num_heads: 8
    attention_dropout: 0.2
    output_dropout: 0.25
    use_diff: true
    use_avg: true

  classification:
    num_classes: 2
    hidden_dim: 256
    dropout: 0.5

training:
  epochs: 100
  batch_size: 2
  gradient_accumulation_steps: 32

  optimizer:
    name: "adamw"
    lr: 5.0e-5
    backbone_lr_scale: 0.2
    weight_decay:
      backbone: 0.05
      fusion: 0.05
      head: 0.01
    betas: [0.9, 0.999]

  scheduler:
    name: "onecycle"
    max_lr: 5.0e-4
    pct_start: 0.3
    div_factor: 10.0
    final_div_factor: 100.0
    anneal_strategy: "cos"

  label_smoothing: 0.05

  # sqrt-inv from manifest: BR4=1613, BR5=1893 -> sqrt(1893/1613)=1.084
  class_weights: [1.08, 1.00]

  use_swa: true
  swa_start_epoch: 5

  early_stopping:
    enabled: true
    patience: 20
    metric: "val_f1_macro"
    mode: "max"

mlflow:
  tracking_uri: "https://dagshub.com/alilivanturk/Mammography-BIRADS-PNG8Bit.mlflow"
  experiment_name: "cascade/stage2_malign"
  dagshub_username: "alilivanturk"
  dagshub_token: "${DAGSHUB_TOKEN}"
  log_every_n_steps: 50
  tags:
    parent_experiment: C6
    cascade_stage: stage2b

wandb:
  project: "mammography-birads-classification"
  entity: ""

visualization:
  confusion_matrix:
    save_dir: "outputs/G2b_stage2_malign/plots"
  classification_report:
    save_dir: "outputs/G2b_stage2_malign/reports"

checkpoint:
  save_dir: "outputs/G2b_stage2_malign/checkpoints"
  save_top_k: 3
  save_last: true
